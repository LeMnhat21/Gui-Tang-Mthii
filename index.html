<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Người Thương ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-dark: #ff4d6d;
            --pink-medium: #ff758f;
            --pink-light: #ffb7c5;
            --white-neon: #fff;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
        }

        /* NỀN ĐỘNG CHUYỂN MÀU */
        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #fff0f3, #ffe0e6, #ffdde1, #fff0f3);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Quicksand', sans-serif; overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* HIỆU ỨNG TRÁI TIM VÀ NƠ BAY */
        .decoration {
            position: fixed; pointer-events: none; z-index: 1;
            animation: floatUp linear forwards; opacity: 0.6;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* MÀN HÌNH CHỜ (OVERLAY) */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 183, 197, 0.9);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            display: flex; justify-content: center; align-items: center;
            z-index: 10000; cursor: pointer; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .neon-text {
            font-size: 2.2rem; font-weight: bold; color: var(--white-neon);
            text-align: center; text-transform: uppercase;
            font-family: 'Dancing Script', cursive;
            text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #ff4d6d, 0 0 40px #ff4d6d;
            animation: pulse 1.5s infinite alternate;
            padding: 20px;
        }

        @keyframes pulse { from { transform: scale(0.95); } to { transform: scale(1.05); } }

        /* KHUNG NỘI DUNG (GLASSMORPHISM) */
        #container {
            width: 85%; max-width: 500px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 50px 25px; border-radius: 40px;
            box-shadow: 0 25px 50px rgba(255, 77, 109, 0.3);
            text-align: center; border: 4px solid var(--glass-border);
            position: relative; z-index: 10;
        }

        h2 {
            color: var(--pink-dark);
        }

        #mainTitle {
            font-family: 'Dancing Script', cursive; 
            font-size: 2.3rem; margin-bottom: 30px;
            position: relative; z-index: 200;
            background: linear-gradient(to right, #ff0055, #ff4d6d);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .hello-kitty-img {
            width: 160px; height: 160px; object-fit: contain;
            margin-bottom: 20px; position: relative; z-index: 200;
            filter: drop-shadow(0 10px 15px rgba(255, 77, 109, 0.4));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .btn-group {
            display: flex; justify-content: center; align-items: center;
            gap: 20px; margin-top: 30px; min-height: 150px;
        }

        button {
            padding: 15px 35px; border: none;
            border-radius: 50px; cursor: pointer; font-weight: 800;
            font-family: 'Quicksand', sans-serif; font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
        }

        #btnYes { 
            background: linear-gradient(45deg, #ff4d6d, #ff758f); color: white; 
            position: relative; z-index: 150;
            box-shadow: 0 10px 20px rgba(255, 77, 109, 0.4);
        }

        #btnNo { 
            background: #fff; color: #ff8fa3; border: 2px solid #ff8fa3;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            position: relative; z-index: 100;
        }

        .hidden { display: none; opacity: 0; }
        .show { display: block; opacity: 1; animation: fadeIn 0.5s forwards; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        input[type="text"] { 
            width: 90%; padding: 15px; border: 3px dashed var(--pink-light); 
            border-radius: 25px; text-align: center; font-size: 1.1rem;
            color: var(--pink-dark); background: rgba(255, 255, 255, 0.6);
        }

        .ribbon {
            position: absolute; top: -25px; left: -25px;
            width: 80px; z-index: 250; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1));
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="startEverything()">
        <div class="neon-text">Nếu muốn biết trong nìi có dìiii<br>thì ấn dô ii nànggg ❤️</div>
    </div>

    <audio id="bgMusic" loop>
        <source src="nhacrmt.mp3" type="audio/mpeg">
    </audio>

    <div id="container">
        <img src="ribbon.gif" class="ribbon">

        <div id="step1">
            <img src="hello kitty GIF.gif" class="hello-kitty-img">
            <h2 id="mainTitle">Bạn có muốn làm người yêu tớ không? ❤️</h2>
            <div class="btn-group">
                <button id="btnYes" onclick="goStep(2)">Đồng ý</button>
                <button id="btnNo" onmouseover="dodge()" onclick="dodge()">Từ chối</button>
            </div>
        </div>

        <div id="step2" class="hidden">
            <img src="sit ktGIF.gif" class="hello-kitty-img">
            <h2>O MAI GÓTT!! Sao mthii lại đồng ý dạaa? 🥰</h2>
            <input type="text" id="reasonInput" placeholder="Nói thật lòng nha..." oninput="fakeType()">
            <br><br><button id="btnYes" onclick="goStep(3)">Gửi cho tớ ✨</button>
        </div>

        <div id="step3" class="hidden">
            <img src="dance kitGIF.gif" class="hello-kitty-img">
            <h2>Hạnh phúc dạaaa chờiiii!! <br>Vậy là tuii dới mthii iuuuu nhau gòiii nhée! 💖</h2>
            <button id="btnYes" onclick="goStep(4)">Tiếp tục</button>
        </div>

        <div id="step4" class="hidden">
            <img src="kitiwpresent.png" class="hello-kitty-img" id="finalImg">
            <h2 id="finalText">Tui có qà cho mthii nèee... 🎁</h2>
            <button id="btnSurprise" onclick="wedding()">🎁 Nhận quà của mnhat dth 🎁</button>
            <p id="msg" style="color: #ff4d6d; margin-top: 15px; font-weight: bold;"></p>
        </div>
    </div>

    <script>
        let dodgeCount = 0;
        let yesScale = 1;

        const decos = ['❤️', '💖', '🌸', '✨', '🎀'];
        function createDecoration() {
            const el = document.createElement('div');
            el.className = 'decoration';
            el.innerHTML = decos[Math.floor(Math.random() * decos.length)];
            el.style.left = Math.random() * 100 + 'vw';
            el.style.fontSize = (Math.random() * 20 + 20) + 'px';
            el.style.animationDuration = (Math.random() * 3 + 4) + 's';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 5000);
        }
        setInterval(createDecoration, 300);

        function startEverything() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => { document.getElementById('overlay').style.display = 'none'; }, 800);
            const audio = document.getElementById('bgMusic');
            audio.volume = 0.5;
            audio.play().catch(e => console.log("Audio play deferred"));
        }

        function dodge() {
            if (dodgeCount < 12) {
                const btnNo = document.getElementById('btnNo');
                const btnYes = document.getElementById('btnYes');
                btnNo.style.position = 'fixed';
                const x = Math.random() * (window.innerWidth - btnNo.offsetWidth - 40) + 20;
                const y = Math.random() * (window.innerHeight - btnNo.offsetHeight - 40) + 20;
                btnNo.style.left = x + 'px';
                btnNo.style.top = y + 'px';
                btnNo.style.zIndex = "999";

                dodgeCount++;
                yesScale += 0.35;
                btnYes.style.transform = `scale(${yesScale})`;
                
                const title = document.getElementById('mainTitle');
                if(dodgeCount === 4) title.innerText = "Ơ kìa, đừng né mà! 🥺";
                if(dodgeCount === 8) title.innerText = "Cậu định từ chối tớ thật sao? 💔";
                if(dodgeCount === 11) title.innerText = "Chấp nhận đi nàooooo";
            } else {
                document.getElementById('btnNo').style.display = 'none';
            }
        }

        function goStep(step) {
            document.querySelectorAll('#container > div').forEach(d => {
                d.classList.add('hidden');
                d.classList.remove('show');
            });
            const next = document.getElementById('step' + step);
            next.classList.remove('hidden');
            next.classList.add('show');
        }

        const texts = ["Vì mnhat là người tuyệt vời nhất!", "Vì mthii lỡ say nắng mnhat mất rồi...", "Tại mnhat vừa giỏi vừa đẹp trai!", "Tại mthii muốn bên mnhat mãi mãi!", "Tại mnhat dễ thương quá đi mất!❤️", "Mthii không nỡ rời xa mnhat", "Vì lúc nào mnhat cũng ở trong tim mthii hết"];
        let idx = 0;
        function fakeType() {
            const input = document.getElementById('reasonInput');
            const target = texts[idx % texts.length];
            input.value = target.substring(0, input.value.length);
            if (input.value.length >= target.length) idx++;
        }

        let clicks = 0;
        function wedding() {
            clicks++;
            const msg = document.getElementById('msg');
            if (clicks < 6) {
                msg.innerText = "Đang duyệt thủ tục lý hồ sơ... Bấm thêm xem! (" + clicks + "/6)";
            } else {
                // CHỈNH SỬA TẠI ĐÂY: Thay đổi ảnh khi hoàn tất 6 lần bấm
                // Bạn hãy thay 'anh-ket-hon.gif' bằng tên file ảnh bạn muốn hiện ra cuối cùng
                document.getElementById('finalImg').src = 'happi.gif'; 
                
                document.getElementById('finalText').innerHTML = "💍 ĐÃ ĐĂNG KÝ KẾT HÔN THÀNH CÔNG! 💍";
                document.getElementById('btnSurprise').style.display = 'none';
                msg.innerHTML = "Bây giờ mthii chính thức là vợ của tuii! ❤️";
                document.body.style.background = "#ffb7c5";
                for(let i=0; i<20; i++) setTimeout(createDecoration, i*100);
            }
        }
    </script>
</body>
</html>
